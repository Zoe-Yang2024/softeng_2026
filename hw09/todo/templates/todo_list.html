<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
</head>
<body>
    <h1>Todo List</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="content" placeholder="请输入任务">
        <button type="submit">添加</button>
    </form>

    <ul>
        {% for todo in todos %}
            <li>
                {{ todo.content }}
                <a href="/delete/{{ todo.id }}">删除</a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
