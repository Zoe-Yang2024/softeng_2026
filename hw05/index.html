 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주조양의 홈 (Zoe's Home)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about_me.html">About Me</a>
        <a href="blog_list.html">Blog</a>
    </nav>

   <div class="container">
    <h1>어서오세요! (欢迎！)</h1>
    
    <div style="margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
        <h3>Enter your name</h3>
        <input type="text" id="userName" placeholder="Name" style="padding: 8px; width: 200px; border: 1px solid #ccc; border-radius: 4px;">
        <button onclick="submitName()" style="padding: 8px 15px; background-color: #ff4b4b; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Submit
        </button>
        
        <div id="messageArea" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
function submitName() {
    const name = document.getElementById('userName').value;
    const messageArea = document.getElementById('messageArea');
    
    if (name) {
        
        messageArea.innerHTML = `<div style="padding: 10px; background-color: #d4edda; color: #155724; border-radius: 5px;">
            Hello ${name}! 🎉
        </div>`;
        
       
        createBalloons();
    } else {

        messageArea.innerHTML = `<div style="padding: 10px; background-color: #fff3cd; color: #856404; border-radius: 5px;">
            Please enter your name
        </div>`;
    }
}

function createBalloons() {

    for (let i = 0; i < 30; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        
        const colors = ['#ff6666', '#66ff66', '#6666ff', '#ffcc00', '#ff66ff', '#00ffff'];
        balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        
        balloon.style.left = Math.random() * 100 + 'vw';
        
        const size = Math.random() * 20 + 20 + 'px';
        balloon.style.width = size;
        balloon.style.height = (parseFloat(size) * 1.2) + 'px';
        
        balloon.style.animationDelay = Math.random() * 2 + 's';
        
        document.body.appendChild(balloon);
        
        setTimeout(() => balloon.remove(), 4000);
    }
}
</script>
</body>
</html>
